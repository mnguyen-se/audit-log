<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <title>Audit Log Viewer</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        :root{
            --bg: #0c1210;
            --panel: #111a17;
            --panel-border: #1f2e29;
            --text: #d7e4de;
            --text-dim: #6f8a80;
            --accent: #3ddc97;
            --accent-dim: #235c46;
            --warn: #e2a23c;
            --danger: #e2543c;
            --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }
        *{box-sizing:border-box;}
        body{
            margin:0;
            background:
                    radial-gradient(ellipse at top left, rgba(61,220,151,0.06), transparent 55%),
                    var(--bg);
            color:var(--text);
            font-family:var(--mono);
            min-height:100vh;
        }
        .wrap{max-width:1100px;margin:0 auto;padding:32px 20px 60px;}

        .top{
            display:flex;
            align-items:baseline;
            justify-content:space-between;
            border-bottom:1px solid var(--panel-border);
            padding-bottom:16px;
            margin-bottom:20px;
            flex-wrap:wrap;
            gap:10px;
        }
        .brand{display:flex;align-items:baseline;gap:10px;}
        .brand .dot{
            width:9px;height:9px;border-radius:50%;
            background:var(--accent);
            box-shadow:0 0 8px var(--accent);
            display:inline-block;
            animation:pulse 2s infinite;
        }
        @keyframes pulse{
            0%,100%{opacity:1;}
            50%{opacity:.35;}
        }
        h1{
            font-size:16px;
            letter-spacing:0.08em;
            text-transform:uppercase;
            margin:0;
            color:var(--text);
            font-weight:600;
        }
        .sub{color:var(--text-dim);font-size:12px;}

        .status{font-size:11px;color:var(--text-dim);text-align:right;}
        .status b{color:var(--accent);}

        .controls{
            display:flex;
            gap:10px;
            margin-bottom:18px;
            flex-wrap:wrap;
        }
        input[type=text]{
            flex:1;
            min-width:220px;
            background:var(--panel);
            border:1px solid var(--panel-border);
            color:var(--text);
            padding:10px 12px;
            font-family:var(--mono);
            font-size:13px;
            border-radius:4px;
            outline:none;
        }
        input[type=text]:focus{border-color:var(--accent-dim);}
        input[type=text]::placeholder{color:var(--text-dim);}

        select, button{
            background:var(--panel);
            border:1px solid var(--panel-border);
            color:var(--text);
            padding:10px 14px;
            font-family:var(--mono);
            font-size:12px;
            border-radius:4px;
            cursor:pointer;
        }
        button.primary{
            border-color:var(--accent-dim);
            color:var(--accent);
        }
        button.primary:hover{background:rgba(61,220,151,0.08);}
        button:disabled{opacity:.5;cursor:default;}

        .panel{
            background:var(--panel);
            border:1px solid var(--panel-border);
            border-radius:6px;
            overflow:hidden;
        }

        table{width:100%;border-collapse:collapse;font-size:12.5px;}
        thead th{
            text-align:left;
            padding:10px 14px;
            color:var(--text-dim);
            font-weight:500;
            text-transform:uppercase;
            letter-spacing:0.06em;
            font-size:10.5px;
            border-bottom:1px solid var(--panel-border);
        }
        tbody tr{border-bottom:1px solid rgba(255,255,255,0.03);}
        tbody tr:hover{background:rgba(61,220,151,0.04);}
        td{padding:10px 14px;vertical-align:top;color:var(--text);}
        td.time{color:var(--text-dim);white-space:nowrap;font-size:11.5px;}
        td.action{color:var(--accent);font-weight:600;white-space:nowrap;}
        td.entity{color:var(--warn);white-space:nowrap;}
        td.detail{color:var(--text-dim);}
        td.user{white-space:nowrap;}

        .empty{padding:60px 20px;text-align:center;color:var(--text-dim);font-size:13px;}
        .empty .big{font-size:28px;color:var(--panel-border);margin-bottom:10px;}

        .footer{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 14px;
            border-top:1px solid var(--panel-border);
            font-size:11.5px;
            color:var(--text-dim);
        }
        .footer button{padding:6px 12px;}

        .badge-error{color:var(--danger);}
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ── De trong static/ cua Spring Boot nen dung relative path (cung origin) ──
    // Neu van mo file HTML rieng (khong qua Spring Boot serve) thi doi lai thanh:
    // const API_BASE = "http://localhost:8081";
    const API_BASE = "";

    function timeAgo(iso) {
        const diff = (Date.now() - new Date(iso).getTime()) / 1000;
        if (diff < 60) return `${Math.floor(diff)}s trước`;
        if (diff < 3600) return `${Math.floor(diff / 60)}p trước`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h trước`;
        return new Date(iso).toLocaleString('vi-VN');
    }

    function App() {
        const [logs, setLogs] = useState([]);
        const [page, setPage] = useState(0);
        const [totalPages, setTotalPages] = useState(0);
        const [search, setSearch] = useState("");
        const [autoRefresh, setAutoRefresh] = useState(true);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState(null);
        const [lastUpdated, setLastUpdated] = useState(null);
        const searchTimer = useRef(null);

        const fetchLogs = useCallback((pageArg, searchArg) => {
            setLoading(true);
            setError(null);
            const params = new URLSearchParams({ page: pageArg, size: 20, search: searchArg || "" });
            fetch(`${API_BASE}/api/audit-logs?${params.toString()}`)
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                })
                .then(data => {
                    setLogs(data.content || []);
                    setTotalPages(data.totalPages || 0);
                    setLastUpdated(new Date());
                })
                .catch(err => setError(err.message))
                .finally(() => setLoading(false));
        }, []);

        useEffect(() => {
            fetchLogs(page, search);
        }, [page]);

        useEffect(() => {
            if (searchTimer.current) clearTimeout(searchTimer.current);
            searchTimer.current = setTimeout(() => {
                setPage(0);
                fetchLogs(0, search);
            }, 400);
            return () => clearTimeout(searchTimer.current);
        }, [search]);

        useEffect(() => {
            if (!autoRefresh) return;
            const id = setInterval(() => fetchLogs(page, search), 5000);
            return () => clearInterval(id);
        }, [autoRefresh, page, search, fetchLogs]);

        return (
            <div className="wrap">
                <div className="top">
                    <div>
                        <div className="brand">
                            <span className="dot"></span>
                            <h1>Audit Log Viewer</h1>
                        </div>
                        <div className="sub">Kafka topic: audit-log &nbsp;·&nbsp; audit-log-service :8081</div>
                    </div>
                    <div className="status">
                        {error ? (
                            <span className="badge-error">✕ Không kết nối được API — {error}</span>
                        ) : (
                            <>trạng thái: <b>{loading ? "đang tải…" : "đã kết nối"}</b>
                                {lastUpdated && <div>cập nhật lúc {lastUpdated.toLocaleTimeString('vi-VN')}</div>}
                            </>
                        )}
                    </div>
                </div>

                <div className="controls">
                    <input
                        type="text"
                        placeholder="Tìm theo action, entity, username…"
                        value={search}
                        onChange={e => setSearch(e.target.value)}
                    />
                    <button
                        className={autoRefresh ? "primary" : ""}
                        onClick={() => setAutoRefresh(a => !a)}
                    >
                        {autoRefresh ? "● Tự làm mới: BẬT" : "○ Tự làm mới: TẮT"}
                    </button>
                    <button onClick={() => fetchLogs(page, search)} disabled={loading}>
                        ↻ Làm mới ngay
                    </button>
                </div>

                <div className="panel">
                    {logs.length === 0 ? (
                        <div className="empty">
                            <div className="big">∅</div>
                            {error ? "Không thể tải dữ liệu. Kiểm tra audit-log-service đã chạy chưa." : "Chưa có log nào."}
                        </div>
                    ) : (
                        <table>
                            <thead>
                            <tr>
                                <th style={{width:'140px'}}>Thời gian</th>
                                <th style={{width:'160px'}}>Action</th>
                                <th style={{width:'140px'}}>Entity</th>
                                <th style={{width:'120px'}}>User</th>
                                <th>Chi tiết</th>
                            </tr>
                            </thead>
                            <tbody>
                            {logs.map(l => (
                                <tr key={l.id}>
                                    <td className="time">{timeAgo(l.receivedAt)}</td>
                                    <td className="action">{l.action}</td>
                                    <td className="entity">{l.entity}</td>
                                    <td className="user">{l.username || '—'}</td>
                                    <td className="detail">{l.detail || '—'}</td>
                                </tr>
                            ))}
                            </tbody>
                        </table>
                    )}

                    <div className="footer">
                        <span>Trang {page + 1} / {Math.max(totalPages, 1)}</span>
                        <div>
                            <button onClick={() => setPage(p => Math.max(0, p - 1))} disabled={page === 0}>‹ Trước</button>
                            {' '}
                            <button onClick={() => setPage(p => p + 1)} disabled={page + 1 >= totalPages}>Sau ›</button>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
