server:
  port: 8081   # khac cong voi project PRM chinh (8080) de chay song song

spring:
  application:
    name: audit-service

  # ── Database rieng cho service nay ──
  datasource:
    url: ${AUDIT_DB_URL:jdbc:postgresql://localhost:5432/audit_log_db}
    username: ${AUDIT_DB_USERNAME:postgres}
    password: ${AUDIT_DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # tu tao bang lan dau, doi thanh 'validate' khi da on dinh
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Ket noi Kafka / Confluent Cloud (dung chung config voi project PRM) ──
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: PLAIN
      sasl.jaas.config: >
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_USERNAME}"
        password="${KAFKA_PASSWORD}";

app:
  kafka:
    topic: audit-log
    group-id: audit-log-viewer-group

# Cho phep FE (mo file HTML truc tiep, khong qua server) goi API
cors:
  allowed-origins: "*"